<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>로또 번호 추첨기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, 'Noto Sans KR', sans-serif;
    background: #1a1a2e;
    color: #fff;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 1.2rem;
    letter-spacing: 0.05em;
    color: #e0e0e0;
  }

  /* 추첨기 본체 */
  .machine {
    position: relative;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #3a3a5c, #16162b 70%);
    border: 4px solid #4a4a6a;
    box-shadow:
      0 0 40px rgba(100, 100, 200, 0.15),
      inset 0 0 60px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: box-shadow 0.2s;
  }

  .machine:active {
    box-shadow:
      0 0 60px rgba(100, 100, 200, 0.3),
      inset 0 0 60px rgba(0,0,0,0.4);
  }

  .machine.done {
    cursor: default;
  }

  /* 안쪽에서 떠다니는 미니볼들 */
  .mini-balls {
    position: absolute;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    overflow: hidden;
  }

  .mini-ball {
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    opacity: 0.5;
    font-size: 8px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(0,0,0,0.6);
  }

  /* 중앙 안내 텍스트 */
  .tap-hint {
    position: relative;
    z-index: 2;
    font-size: 1rem;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    text-align: center;
    line-height: 1.5;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .tap-hint .sub {
    font-size: 0.75rem;
    font-weight: 400;
    color: rgba(255,255,255,0.4);
  }

  /* 나온 공 영역 */
  .result-area {
    margin-top: 2rem;
    display: flex;
    gap: 10px;
    height: 64px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .ball {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    animation: ballPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    box-shadow:
      inset -3px -4px 6px rgba(0,0,0,0.25),
      inset 3px 3px 6px rgba(255,255,255,0.2),
      0 4px 15px rgba(0,0,0,0.3);
  }

  .ball::after {
    content: '';
    position: absolute;
    top: 8px;
    left: 14px;
    width: 14px;
    height: 8px;
    background: rgba(255,255,255,0.35);
    border-radius: 50%;
    transform: rotate(-30deg);
  }

  .ball.bonus {
    border: 3px solid #ffd700;
    animation: ballPopBonus 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .plus-sign {
    font-size: 1.5rem;
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    animation: fadeIn 0.3s ease;
  }

  /* 색상 */
  .ball-yellow  { background: linear-gradient(135deg, #fdd835, #f9a825); }
  .ball-blue    { background: linear-gradient(135deg, #42a5f5, #1565c0); }
  .ball-red     { background: linear-gradient(135deg, #ef5350, #c62828); }
  .ball-gray    { background: linear-gradient(135deg, #9e9e9e, #616161); }
  .ball-green   { background: linear-gradient(135deg, #66bb6a, #2e7d32); }

  /* 리셋 버튼 */
  .reset-btn {
    margin-top: 1.8rem;
    padding: 0.6rem 1.8rem;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 2rem;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0;
    pointer-events: none;
    -webkit-tap-highlight-color: transparent;
  }

  .reset-btn.show {
    opacity: 1;
    pointer-events: auto;
  }

  .reset-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }

  /* 카운터 */
  .counter {
    margin-top: 0.8rem;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.35);
    height: 1.2rem;
  }

  /* 애니메이션 */
  @keyframes ballPop {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  @keyframes ballPopBonus {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    50% { transform: scale(1.2) rotate(10deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

  @keyframes float {
    0%, 100% { transform: translate(var(--tx1), var(--ty1)); }
    25% { transform: translate(var(--tx2), var(--ty2)); }
    50% { transform: translate(var(--tx3), var(--ty3)); }
    75% { transform: translate(var(--tx4), var(--ty4)); }
  }

  /* 흔들림 애니메이션 */
  @keyframes shake {
    0%, 100% { transform: translate(0, 0) rotate(0); }
    15% { transform: translate(-4px, 2px) rotate(-1deg); }
    30% { transform: translate(3px, -3px) rotate(1deg); }
    45% { transform: translate(-2px, 1px) rotate(-0.5deg); }
    60% { transform: translate(2px, -1px) rotate(0.5deg); }
    75% { transform: translate(-1px, 2px) rotate(-0.3deg); }
  }

  .machine.shaking {
    animation: shake 0.4s ease;
  }
</style>
</head>
<body>

<h1>LOTTO 6/45</h1>

<div class="machine" id="machine">
  <div class="mini-balls" id="miniBalls"></div>
  <div class="tap-hint" id="hint">
    터치하여<br>추첨 시작
    <div class="sub">Click or Tap</div>
  </div>
</div>

<div class="counter" id="counter"></div>

<div class="result-area" id="resultArea"></div>

<button class="reset-btn" id="resetBtn">다시 추첨</button>

<script>
const TOTAL = 45;
const PICK = 6;
const BONUS = 1;

let pool = [];
let drawn = [];
let drawCount = 0;
let isAnimating = false;

const machine = document.getElementById('machine');
const miniBallsEl = document.getElementById('miniBalls');
const hint = document.getElementById('hint');
const counter = document.getElementById('counter');
const resultArea = document.getElementById('resultArea');
const resetBtn = document.getElementById('resetBtn');

function getBallColor(n) {
  if (n <= 10) return 'ball-yellow';
  if (n <= 20) return 'ball-blue';
  if (n <= 30) return 'ball-red';
  if (n <= 40) return 'ball-gray';
  return 'ball-green';
}

function getBallBg(n) {
  if (n <= 10) return '#fdd835';
  if (n <= 20) return '#42a5f5';
  if (n <= 30) return '#ef5350';
  if (n <= 40) return '#9e9e9e';
  return '#66bb6a';
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function createMiniBalls() {
  miniBallsEl.innerHTML = '';
  pool.forEach(n => {
    const el = document.createElement('div');
    el.className = 'mini-ball';
    el.textContent = n;
    el.style.background = getBallBg(n);

    const cx = 100, cy = 100, r = 80;
    const positions = [];
    for (let i = 0; i < 4; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * r;
      positions.push([
        cx + Math.cos(angle) * dist - 11,
        cy + Math.sin(angle) * dist - 11
      ]);
    }

    el.style.setProperty('--tx1', positions[0][0] + 'px');
    el.style.setProperty('--ty1', positions[0][1] + 'px');
    el.style.setProperty('--tx2', positions[1][0] + 'px');
    el.style.setProperty('--ty2', positions[1][1] + 'px');
    el.style.setProperty('--tx3', positions[2][0] + 'px');
    el.style.setProperty('--ty3', positions[2][1] + 'px');
    el.style.setProperty('--tx4', positions[3][0] + 'px');
    el.style.setProperty('--ty4', positions[3][1] + 'px');

    el.style.left = '0px';
    el.style.top = '0px';
    el.style.animation = `float ${rand(3,6)}s ${rand(0,3000)}ms infinite ease-in-out`;

    miniBallsEl.appendChild(el);
  });
}

function removeMiniBall(number) {
  const balls = miniBallsEl.querySelectorAll('.mini-ball');
  balls.forEach(el => {
    if (parseInt(el.textContent) === number) {
      el.style.transition = 'opacity 0.3s, transform 0.3s';
      el.style.opacity = '0';
      el.style.transform += ' scale(2)';
      setTimeout(() => el.remove(), 300);
    }
  });
}

function drawBall() {
  if (isAnimating || drawCount >= PICK + BONUS) return;
  isAnimating = true;

  // 흔들림
  machine.classList.add('shaking');
  setTimeout(() => machine.classList.remove('shaking'), 400);

  const idx = Math.floor(Math.random() * pool.length);
  const number = pool.splice(idx, 1)[0];
  drawn.push(number);
  drawCount++;

  removeMiniBall(number);

  setTimeout(() => {
    const isBonus = drawCount === PICK + BONUS;

    if (isBonus) {
      // + 기호 추가
      const plus = document.createElement('span');
      plus.className = 'plus-sign';
      plus.textContent = '+';
      resultArea.appendChild(plus);
    }

    // 메인 6개 번호는 정렬해서 표시, 보너스는 마지막에 추가
    if (!isBonus) {
      // 메인 번호들 정렬 후 다시 렌더링
      const mainNumbers = drawn.slice(0, Math.min(drawCount, PICK));
      mainNumbers.sort((a, b) => a - b);

      // 기존 공들 제거 (+ 기호 빼고)
      resultArea.querySelectorAll('.ball').forEach(el => el.remove());

      mainNumbers.forEach((n, i) => {
        const ball = document.createElement('div');
        ball.className = `ball ${getBallColor(n)}`;
        if (i === mainNumbers.length - 1) {
          ball.style.animation = 'ballPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
        } else {
          ball.style.animation = 'none';
        }
        ball.textContent = n;
        resultArea.appendChild(ball);
      });
    } else {
      const ball = document.createElement('div');
      ball.className = `ball bonus ${getBallColor(number)}`;
      ball.textContent = number;
      resultArea.appendChild(ball);
    }

    // 상태 업데이트
    if (drawCount <= PICK) {
      counter.textContent = `${drawCount} / ${PICK + BONUS}`;
      hint.innerHTML = `${drawCount < PICK ? '터치하여<br>다음 번호' : '터치하여<br>보너스 번호'}`;
    }

    if (drawCount >= PICK + BONUS) {
      hint.innerHTML = '추첨 완료!';
      hint.querySelector('.sub')?.remove();
      counter.textContent = '';
      machine.classList.add('done');
      resetBtn.classList.add('show');
    }

    isAnimating = false;
  }, 350);
}

function init() {
  pool = shuffle(Array.from({ length: TOTAL }, (_, i) => i + 1));
  drawn = [];
  drawCount = 0;
  isAnimating = false;
  resultArea.innerHTML = '';
  counter.textContent = '';
  hint.innerHTML = '터치하여<br>추첨 시작<div class="sub">Click or Tap</div>';
  machine.classList.remove('done');
  resetBtn.classList.remove('show');
  createMiniBalls();
}

machine.addEventListener('click', drawBall);
resetBtn.addEventListener('click', init);

init();
</script>
</body>
</html>
